deptrac:
  paths:
    - ./app
  exclude_files:
    - '#.*test.*#'
    - '#.*Test\.php$#'

  layers:
    # Models: Pure Domain - Eloquent models with business logic
    - name: Models
      collectors:
        - type: directory
          value: app/Models/.*

    # Policies: Authorization Layer - define access control
    - name: Policies
      collectors:
        - type: directory
          value: app/Policies/.*

    # Actions: Business Logic - orchestrate operations
    - name: Actions
      collectors:
        - type: directory
          value: app/Actions/.*

    # Controllers: Presentation Layer - handle HTTP requests
    - name: Controllers
      collectors:
        - type: directory
          value: app/Http/Controllers/.*

    # Requests: Validation Layer - form requests
    - name: Requests
      collectors:
        - type: directory
          value: app/Http/Requests/.*

    # Jobs: Background Tasks - async operations
    - name: Jobs
      collectors:
        - type: directory
          value: app/Jobs/.*

    # Middleware: HTTP Pipeline
    - name: Middleware
      collectors:
        - type: directory
          value: app/Http/Middleware/.*

    # Enums: Domain Primitives - backed enums shared across layers (leaf: depends
    # on NOTHING outside itself). Modelling this as its own layer lets every other
    # layer reference the shared vocabulary without loosening any existing rule.
    - name: Enums
      collectors:
        - type: directory
          value: app/Enums/.*

  ruleset:
    # Enums: Domain primitives - depend on NOTHING (true leaf)
    Enums: []

    # Models: Pure domain - may only use Enums (domain primitives)
    Models:
      - Enums

    # Policies: Can use Models and Enums (authorization rules)
    Policies:
      - Models
      - Enums

    # Actions: Can use Models and Enums (business logic isolation)
    Actions:
      - Models
      - Enums

    # Controllers: Can use Actions, Models, Requests, Policies, Enums (thin orchestration)
    Controllers:
      - Actions
      - Models
      - Requests
      - Policies
      - Enums

    # Requests: Can use Models and Enums (for validation rules)
    Requests:
      - Models
      - Enums

    # Jobs: Can use Actions and Models (background processing)
    Jobs:
      - Actions
      - Models

    # Middleware: Can use Models and Enums (for auth, permissions)
    Middleware:
      - Models
      - Enums

  formatters:
    graphviz:
      pointToGroups: false
      groups:
        Models:
          - Models
        Authorization:
          - Policies
        Business:
          - Actions
        Presentation:
          - Controllers
          - Requests
          - Middleware
        Background:
          - Jobs
