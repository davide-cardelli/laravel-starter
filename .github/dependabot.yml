version: 2
updates:
  # Composer dependencies
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "davide-cardelli"
    labels:
      - "dependencies"
      - "composer"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "davide-cardelli"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # Ignore major version updates for Vue (requires manual testing)
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      # Ignore major version updates for Vite (requires manual testing)
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Ignore major version updates for TypeScript (TS 7 native compiler
      # requires official vue-tsc support before adoption)
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Ignore major version updates for @types/node (majors track Node
      # releases; bump manually when the runtime target in .nvmrc moves)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
